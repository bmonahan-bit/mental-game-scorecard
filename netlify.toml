[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback — React Router handles /sign-in, /sign-up, etc. client-side.
# Without this, a hard refresh on those routes would 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
