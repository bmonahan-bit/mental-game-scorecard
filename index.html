<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/AppIcon1024.png" />

    <!-- Viewport: maximum-scale=1 + user-scalable=no prevents iOS from
         auto-zooming on input focus and "sticking" zoomed between pages.
         Safe because every input in the app is ≥16px. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- iOS PWA / standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mental Game" />
    <link rel="apple-touch-icon" href="/AppIcon1024.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Mental Game Scorecard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,wght@0,600;0,800;1,600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Reset */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      /* Lock the document so ONLY in-shell scroll containers scroll.
         Prevents the "whole screen scrolls" bug when a page's content
         exceeds the 100svh shell. */
      html,
      body {
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #09090b;
      }
      body {
        position: fixed;
        inset: 0;
        width: 100%;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #f8fafc;
      }
      @media (prefers-color-scheme: light) {
        html,
        body {
          background: #ffffff;
          color: #09090b;
        }
      }

      #root {
        height: 100%;
        height: 100svh;
        width: 100%;
        /* Safe-area padding lives inside the app shell; keep root flush. */
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }

      /* iOS auto-zoom failsafe: every focusable text field stays ≥16px. */
      input,
      textarea,
      select {
        font-size: 16px;
      }

      /* Hide scrollbars (app uses custom scroll styling) */
      ::-webkit-scrollbar {
        width: 0;
        display: none;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Splash screen — visible until React mounts */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      @media (prefers-color-scheme: light) {
        #splash {
          background: #ffffff;
        }
      }
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(127, 127, 127, 0.25);
        border-top-color: #16a34a;
        animation: splashSpin 0.8s linear infinite;
      }
      @keyframes splashSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash"><div class="spinner"></div></div>
    <div id="root"></div>

    <script>
      // Splash hook used by main.jsx
      window.__hideSplash = function () {
        var el = document.getElementById('splash');
        if (!el) return;
        el.classList.add('hidden');
        setTimeout(function () {
          el.remove();
        }, 350);
      };
    </script>

    <script type="module" src="/main.jsx"></script>
  </body>
</html>
